<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Eric W Iverson</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: rgba(255, 255, 255, 0.75);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 80px 24px;
  }
  .container {
    max-width: 640px;
    margin: 0 auto;
  }
  header {
    margin-bottom: 64px;
  }
  header a {
    font-size: 13px;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.35);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  header a:hover { color: rgba(255, 255, 255, 0.65); }
  h1 {
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 300;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.55);
    text-transform: uppercase;
    margin-top: 32px;
  }
  .post-list {
    list-style: none;
  }
  .post-list li {
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    padding: 28px 0;
  }
  .post-list li:last-child {
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  .post-list a {
    display: block;
    text-decoration: none;
    color: inherit;
  }
  .post-title {
    font-size: 1.05rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    color: rgba(255, 255, 255, 0.8);
    margin-bottom: 8px;
    transition: color 0.2s;
  }
  .post-list a:hover .post-title { color: #fff; }
  .post-footer {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .post-date {
    font-size: 13px;
    letter-spacing: 0.05em;
    color: rgba(255, 255, 255, 0.3);
  }
  .post-category {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.22);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 2px 8px;
    border-radius: 3px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <a href="/">← ewiverson.com</a>
    <h1>Blog</h1>
  </header>
  <ul class="post-list">
    <li>
      <a href="/blog/posts/spelling-worksheet-generator.html">
        <div class="post-title">Building a Spelling Worksheet Generator as a Claude Skill</div>
        <div class="post-footer">
          <span class="post-date">2026-05-02</span>
          <span class="post-category">Personal Projects</span>
        </div>
      </a>
    </li>
  </ul>
</div>
</body>
</html>
